<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Gospel Bracelet Cinema v6.10 · 9 Chapter Build</title>
<style>
:root{color-scheme:dark;font-family:ui-sans-serif,system-ui,-apple-system,"Noto Sans KR",sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#030407;color:#f8fafc;overflow:hidden}
button,input{font:inherit;color:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent}
.screen{display:none;min-height:100dvh}
.screen.active{display:grid}

/* HOME */
.home{place-items:center;text-align:center;padding:28px;
  background:radial-gradient(circle at 50% 22%,rgba(255,255,255,.09),transparent 34rem),#030407}
.homebox{width:min(820px,100%);display:grid;gap:28px}
.logo{width:82px;height:82px;margin:0 auto;border-radius:50%;
  border:1px solid rgba(255,255,255,.16);
  background:radial-gradient(circle,#fff 0 18%,rgba(255,255,255,.2) 19% 42%,transparent 43%);
  box-shadow:0 0 70px rgba(255,255,255,.18)}
.eyebrow{color:rgba(248,250,252,.6);letter-spacing:.12em;text-transform:uppercase;font-size:13px;margin-bottom:12px}
h1{font-size:clamp(40px,9vw,88px);line-height:.92}
.copy{width:min(620px,100%);margin:18px auto 0;color:rgba(248,250,252,.6);font-size:clamp(16px,2vw,21px);line-height:1.6}
.actions{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
.big{min-height:92px;border:1px solid rgba(255,255,255,.16);border-radius:24px;
  background:rgba(255,255,255,.08);font-size:22px;font-weight:850}
.big.primary{background:linear-gradient(135deg,rgba(255,255,255,.22),rgba(247,200,95,.16))}

/* PRESENTATION */
.presentation{position:relative;background:#030407;overflow:hidden}
.presentation canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
.ui{position:fixed;z-index:5;inset:0;pointer-events:none;transition:opacity .35s ease}
.immersive .ui{opacity:0;pointer-events:none}
.top{position:absolute;top:max(16px,env(safe-area-inset-top));left:max(16px,env(safe-area-inset-left));display:flex;gap:10px;pointer-events:auto}
.icon{width:46px;height:46px;border:1px solid rgba(255,255,255,.16);border-radius:999px;
  background:rgba(0,0,0,.35);backdrop-filter:blur(18px);display:grid;place-items:center;border:none}
.label{position:absolute;left:20px;bottom:20px;width:min(520px,calc(100vw - 40px));
  padding:14px 16px;border:1px solid rgba(255,255,255,.12);border-radius:16px;
  background:rgba(0,0,0,.26);backdrop-filter:blur(18px)}
.label small,.meta{display:block;color:rgba(255,255,255,.5);font-size:11px;text-transform:uppercase;letter-spacing:.1em}
.label strong{display:block;margin-top:4px;font-size:18px}
.label span{display:block;margin-top:5px;color:rgba(255,255,255,.64);font-size:14px;line-height:1.45}
.hud{position:absolute;right:18px;bottom:18px;display:grid;grid-template-columns:auto auto;gap:12px;align-items:end;pointer-events:auto}
.panel{border:1px solid rgba(255,255,255,.16);border-radius:16px;background:rgba(0,0,0,.36);backdrop-filter:blur(18px)}
.roompanel{display:grid;grid-template-columns:112px minmax(190px,260px);gap:12px;padding:12px;align-items:center}
.qr{width:112px;height:112px;background:#fff;border-radius:10px;padding:8px}
.room{font-size:27px;font-weight:900;margin-top:3px}
.link{margin-top:8px;color:rgba(255,255,255,.55);font-size:12px;overflow-wrap:anywhere}
.counter{padding:16px;min-width:126px}
.count{font-size:24px;font-weight:900;margin-top:3px}
.blackout{position:fixed;z-index:20;inset:0;background:#000;display:none;place-items:center;
  color:rgba(255,255,255,.16);font-size:12px;text-transform:uppercase}
.blackout.active{display:grid}

/* REMOTE */
.remote{place-items:center;padding:max(18px,env(safe-area-inset-top)) 18px max(18px,env(safe-area-inset-bottom));
  background:radial-gradient(circle at 50% 18%,rgba(255,255,255,.11),transparent 24rem),#030407}
.rshell{width:min(480px,100%);display:grid;gap:14px}
.card{border:1px solid rgba(255,255,255,.16);border-radius:22px;background:rgba(255,255,255,.08);
  backdrop-filter:blur(24px);padding:18px}
.rtop{display:flex;justify-content:space-between;align-items:center;gap:14px}
.rtop strong{display:block;font-size:24px;margin-top:3px}
.conn{display:flex;align-items:center;gap:7px;color:rgba(248,250,252,.6);font-size:13px}
.dot{width:9px;height:9px;border-radius:50%;background:#fb7185;box-shadow:0 0 16px #fb7185}
.dot.on{background:#86efac;box-shadow:0 0 16px #86efac}
.orbwrap{display:grid;place-items:center;padding:28px 16px 24px}
.rorb{width:min(64vw,260px);aspect-ratio:1;border-radius:50%;position:relative;display:grid;place-items:center;
  background:radial-gradient(circle at 35% 30%,rgba(255,255,255,.88),var(--orb,#ffd166) 24%,rgba(255,255,255,.06) 60%,rgba(0,0,0,.18) 73%);
  box-shadow:0 0 80px color-mix(in srgb,var(--orb,#ffd166),transparent 45%);animation:spin 8s linear infinite}
.rorb:before{content:"";position:absolute;inset:12%;border-radius:50%;
  border:1px solid rgba(255,255,255,.25);border-top-color:rgba(255,255,255,.85);
  animation:spin 3s linear infinite reverse}
.go{width:50%;aspect-ratio:1;border-radius:50%;border:1px solid rgba(255,255,255,.45);
  background:rgba(0,0,0,.38);font-size:clamp(26px,8vw,42px);font-weight:1000}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.rbtn{min-height:78px;border:1px solid rgba(255,255,255,.16);border-radius:18px;
  background:rgba(255,255,255,.08);font-weight:850;font-size:18px}
.rbtn.active{border-color:rgba(247,200,95,.68);background:rgba(247,200,95,.15)}
.manual{display:grid;grid-template-columns:1fr auto;gap:10px}
.manual input{min-height:48px;border:1px solid rgba(255,255,255,.16);border-radius:14px;
  background:rgba(0,0,0,.25);padding:0 14px;text-transform:uppercase}
.notice{position:fixed;z-index:50;left:50%;bottom:18px;transform:translateX(-50%);
  width:min(680px,calc(100% - 28px));padding:13px 15px;border:1px solid rgba(251,113,133,.35);
  border-radius:14px;background:rgba(60,12,22,.86);color:#ffe4e6;font-size:14px}
.notice:empty{display:none}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:820px){
  .actions,.hud{grid-template-columns:1fr}
  .roompanel{grid-template-columns:92px 1fr}.qr{width:92px;height:92px}
  .counter{display:none}.manual{grid-template-columns:1fr}.big{min-height:78px}
}
</style>
</head>
<body>
<main>
<!-- HOME -->
<section class="screen home active" id="homeScreen">
  <div class="homebox">
    <div class="logo"></div>
    <div>
      <p class="eyebrow">Gospel Bracelet · Cinematic v6.10</p>
      <h1>복음팔찌 시네마</h1>
      <p class="copy">슬라이드가 아니라 리모컨으로 9개의 시네마틱 챕터를 넘기는 인터랙티브 발표입니다. 중앙 입자 스피어와 세계 상태가 복음의 흐름에 따라 변화합니다.</p>
    </div>
    <div class="actions">
      <button class="big primary" id="startPresentation">발표 화면</button>
      <button class="big" id="startRemote">리모컨</button>
    </div>
  </div>
</section>

<!-- PRESENTATION -->
<section class="screen presentation" id="presentationScreen">
  <canvas id="cinema"></canvas>
  <div class="ui" id="cinemaUi">
    <div class="top">
      <button class="icon" id="homeFromPresentation">‹</button>
      <button class="icon" id="fullScreenButton">⛶</button>
    </div>
    <div class="label">
      <small id="chapterSmall">Chapter 01</small>
      <strong id="chapterTitle"></strong>
      <span id="chapterDesc"></span>
    </div>
    <aside class="hud">
      <div class="panel roompanel">
        <div class="qr" id="qrCode"></div>
        <div>
          <span class="meta">Room ID</span>
          <div class="room" id="presentationRoom">------</div>
          <div class="link" id="remoteLink"></div>
        </div>
      </div>
      <div class="panel counter">
        <span class="meta">Chapter</span>
        <div class="count"><span id="presentationChapter">1</span>/<span id="presentationTotal">9</span></div>
      </div>
    </aside>
  </div>
  <div class="blackout" id="blackout">Black screen</div>
</section>

<!-- REMOTE -->
<section class="screen remote" id="remoteScreen">
  <div class="rshell">
    <button class="icon" id="homeFromRemote">‹</button>
    <div class="card rtop">
      <div>
        <span class="meta">Connected Room</span>
        <strong id="remoteRoom">------</strong>
      </div>
      <div class="conn">
        <span class="dot" id="connectionDot"></span>
        <span id="connectionText">대기 중</span>
      </div>
    </div>
    <div style="display:grid;gap:12px">
      <button class="rbtn" id="previousChapter">◀  이전 슬라이드</button>
      <button class="rbtn" id="nextChapter">다음 슬라이드  ▶</button>
      <button class="rbtn" id="toggleFullscreen">전체화면 전환</button>
      <button class="rbtn" id="sphereGallery">복음 스피어 보기</button>
      <button class="rbtn" id="calibrateBtn">📍 위치값 설정</button>
    </div>
    <div class="card" id="manualRoomCard">
      <span class="meta">Manual Connect</span>
      <div class="manual">
        <input id="manualRoomInput" maxlength="12" placeholder="ROOM ID"/>
        <button class="rbtn" id="manualRoomConnect">연결</button>
      </div>
    </div>
    <div style="color:rgba(255,255,255,.3);font-size:12px;text-align:center">gospel cinema v6.10 · 9 chapters</div>
  </div>
</section>
</main>
<div class="notice" id="notice"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import{getDatabase,ref,set,onValue}from"https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig={apiKey:"AIzaSyChDJWmEsddYz178QLa6VCF5Xq9gS3uRAs",authDomain:"mongpj1.firebaseapp.com",databaseURL:"https://mongpj1-default-rtdb.firebaseio.com",projectId:"mongpj1",storageBucket:"mongpj1.firebasestorage.app",messagingSenderId:"525975516949",appId:"1:525975516949:web:babf2d21760764db219b1c"};

// This build is organized as 8 controllable chapters.
// Some drawPrototypeNailing+ helpers below are retained as visual modules/prototypes,
// but the remote, labels, Firebase state, and render timeline all use Chapter 1-8.
const TOTAL=8;
const CHAPTER_INFO=[
  ['순수한 세계','검은 우주 속 흰 입자 스피어가 고요히 회전하며 시작됩니다.'],
  ['이야기의 시작','스피어 회전이 빨라지고 입자들이 폭발하듯 흩어지며 세계가 살아납니다.'],
  ['금색 재형성','흩어진 입자들이 다시 모여 금색 스피어가 되고, 흰 무한 공간으로 전환됩니다.'],
  ['추락','흰 세계가 균열처럼 깨지고 검은 골목과 비 속에서 스피어가 검게 물듭니다.'],
  ['죄','검은 스피어가 오른쪽 아래부터 붉게 번지고, 흰 입자들이 위로 거슬러 올라갑니다.'],
  ['새로운 시작','꼬리와 흰 입자가 사라지고 붉은 스피어의 점들이 하나씩 흰색으로 바뀝니다.'],
  ['씨앗','흰 스피어가 흙과 잔디의 세계에 씨앗처럼 심어집니다.'],
  ['새 생명','스피어에서 초록 싹이 돋아나며 조용한 성장과 희망으로 마무리됩니다.'],
];

const $=s=>document.querySelector(s);
const canvas=$('#cinema'), ctx=canvas.getContext('2d');
let W=innerWidth, H=innerHeight, DPR=1;

// ─── State ─────────────────────────────────────────────────────────────────
// Naming rule: UI/docs call the controllable units "chapters".
// Firebase writes still use the key "scene" for compatibility with older remotes.
// ─── Timeline engine ──────────────────────────────────────────────────────────
// T  : current timeline position in seconds (continuously flowing)
// Tgt: target T we are tweening toward
// Each chapter N has a "checkpoint" = the T value where that chapter's narrative
// is fully settled (presenter pauses here to talk).
// When the chapter advances, Tgt jumps to the next checkpoint and T chases it.
// When the chapter goes backward, T snaps directly (instant rewind).
//
// Chapter durations (seconds between checkpoints):
const CK_DUR=[
  0,    // chapter 1  start  T=0
  9,    // chapter 1  순수한 세계
  11,   // chapter 2  spin+blast
  11,   // chapter 3  vortex+gold → 흰 공간
  13,   // chapter 4  흰 배경 깨짐 → 검은 골목 → 스피어 검게
  13,   // chapter 5  검은→빨강
  32,   // chapter 6  new beginning (꼬리 fade out → 입자별 흰색 전환)
  9,    // chapter 7  seed
  13,   // chapter 8  sprout
];
// Precompute checkpoint T values
const CK=CK_DUR.reduce((acc,d,i)=>{acc.push(i===0?0:acc[i-1]+d);return acc;},[]);
const TMAX=CK[CK.length-1];

const S={mode:'home',roomId:'',chapter:1,prevChapter:1,
  // timeline
  T:0,          // current rendered T
  Tgt:0,        // target T (what we're animating toward)
  Tspeed:1,     // playback speed multiplier while tweening
  lastRealTime:performance.now(),
  black:false,immersive:false,gallery:false,galleryProg:0,db:null,ready:false,unsub:null,remoteColor:'#ffd166',particles:[],
  lemOff:{bx:0,by:0},phoneOffset:{x:0,y:0}};

// ─── Particle pools ─────────────────────────────────────────────────────────
let sphere=[], stars=[], rain=[], wind=[], dust=[];
let castlePts=[], crossPts=[];
let chapter8TerrainCache=null;

// ─── Math helpers ───────────────────────────────────────────────────────────
const rnd=(a=1,b=0)=>Math.random()*(a-b)+b;
const clamp=(x,a=0,b=1)=>Math.max(a,Math.min(b,x));
const mix=(a,b,t)=>a+(b-a)*t;
const ease=t=>t*t*(3-2*t);
const ease3=t=>t*t*t*(t*(t*6-15)+10);
function hex(c){const m=c.match(/#(..)(..)(..)/);return m?[parseInt(m[1],16),parseInt(m[2],16),parseInt(m[3],16)]:[255,255,255]}
function rgba(c,a){
  if(c.startsWith('rgb')){const m=c.match(/(\d+),\s*(\d+),\s*(\d+)/);if(m)return`rgba(${m[1]},${m[2]},${m[3]},${a})`;}
  const[r,g,b]=hex(c);return`rgba(${r},${g},${b},${a})`;
}
// Deterministic pseudo-random (no flicker on re-render)
function stableNoise(i,salt=0){return Math.abs(Math.sin(i*127.1+salt*311.7)*43758.5453)%1}

// ─── Build world ────────────────────────────────────────────────────────────
function makeWorld(){
  // Stars
  stars=Array.from({length:220},()=>({x:rnd(W),y:rnd(H),r:rnd(1.3,.18),a:rnd(.8,.1),tw:rnd(.022,.003)}));

  // Sphere — Fibonacci lattice, 1400 pts
  sphere=Array.from({length:1400},(_,i)=>{
    const t=(i+.5)/1400,phi=Math.acos(1-2*t),th=Math.PI*(1+Math.sqrt(5))*i;
    return{x:Math.sin(phi)*Math.cos(th),y:Math.sin(phi)*Math.sin(th),z:Math.cos(phi),
      s:rnd(1.85,.65),seed:rnd(Math.PI*2),special:false,color:'#f8fbff',
      // blast off-screen target (stable)
      bx:(Math.random()-.5)*4,by:(Math.random()-.5)*4};
  });

  rain=Array.from({length:500},()=>({x:rnd(W),y:rnd(H),l:rnd(28,8),v:rnd(20,8)}));
  wind=Array.from({length:300},()=>({x:rnd(W),y:rnd(H),v:rnd(8,2.5),r:rnd(2,.4),a:rnd(.55,.1)}));
  dust=Array.from({length:280},()=>({x:rnd(W),y:rnd(H),z:rnd(1,.04),v:rnd(3,.5),r:rnd(3,.6)}));
  makeCastle();
  makeCross();
}

function makeCastle(){
  castlePts=[];
  // base: 성 기저선. H*0.58로 올려서 성이 화면 위쪽에 크게 보이도록
  const cx=W/2, base=H*.58, sc=Math.min(W,H)/520;
  function rect(x,y,w,h,n){for(let i=0;i<n;i++)castlePts.push({x:cx+(x+rnd(w)-w/2)*sc,y:base+(y+rnd(h))*sc,seed:rnd(6.28)})}
  function tri(x,y,w,h,n){for(let i=0;i<n;i++){let u=Math.random(),v=Math.random();if(u+v>1){u=1-u;v=1-v}castlePts.push({x:cx+(x+(u-.5)*w)*sc,y:base+(y-v*h)*sc,seed:rnd(6.28)})}}
  // 본체
  rect(0,-160,280,160,1400);
  // 양쪽 탑
  rect(-160,-230,80,230,800);rect(160,-230,80,230,800);
  // 중앙 높은 탑
  rect(0,-310,100,310,900);
  // 탑 지붕(삼각형)
  tri(-160,-230,110,110,560);tri(160,-230,110,110,560);
  tri(0,-310,140,130,700);
  // 옆 작은 탑
  rect(-268,-115,105,115,560);rect(268,-115,105,115,560);
  tri(-268,-115,125,85,380);tri(268,-115,125,85,380);
}

function makeCross(){
  crossPts=[];
  const sc=Math.min(W,H)/700, cx=W*.66, cy=H*.52;
  function box(x,y,z,w,h,d,n){for(let i=0;i<n;i++)crossPts.push({x:cx+(x+rnd(w)-w/2)*sc,y:cy+(y+rnd(h)-h/2)*sc,z:z+rnd(d)-d/2,seed:rnd(6.28)})}
  box(0,0,0,88,435,64,1900);
  box(0,-108,0,315,84,64,1600);
}

function resize(){
  DPR=Math.min(devicePixelRatio||1,2);
  canvas.width=innerWidth*DPR; canvas.height=innerHeight*DPR;
  canvas.style.width=innerWidth+'px'; canvas.style.height=innerHeight+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  W=innerWidth; H=innerHeight;
  chapter8TerrainCache=null;
  makeWorld();
}
addEventListener('resize',resize);

// ─── Draw helpers ────────────────────────────────────────────────────────────

function drawStars(alpha=1){
  ctx.save(); ctx.globalAlpha=alpha;
  for(const s of stars){
    s.a+=s.tw*(Math.random()>.5?1:-1);
    s.a=clamp(s.a,.07,.9);
    ctx.fillStyle=`rgba(230,242,255,${s.a})`;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,7); ctx.fill();
  }
  ctx.restore();
}
function drawStarsRising(alpha=1,lift=0){
  ctx.save(); ctx.globalAlpha=alpha;
  for(const s of stars){
    s.a+=s.tw*(Math.random()>.5?1:-1);
    s.a=clamp(s.a,.07,.9);
    const y=s.y-lift*H;
    if(y<-20) continue;
    ctx.fillStyle=`rgba(230,242,255,${s.a})`;
    ctx.beginPath(); ctx.arc(s.x,y,s.r,0,7); ctx.fill();
  }
  ctx.restore();
}
function drawTopStars(alpha=1){
  ctx.save(); ctx.globalAlpha=alpha;
  for(const s of stars){
    if(s.y>H*.36) continue;
    s.a+=s.tw*(Math.random()>.5?1:-1);
    s.a=clamp(s.a,.08,.92);
    ctx.fillStyle=`rgba(230,242,255,${s.a})`;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,7); ctx.fill();
  }
  ctx.restore();
}

function rgbFromHex(c){const m=String(c||'').match(/#(..)(..)(..)/);return m?[parseInt(m[1],16),parseInt(m[2],16),parseInt(m[3],16)]:[248,251,255]}
function mixRgb(a,b,t){return [Math.round(mix(a[0],b[0],t)),Math.round(mix(a[1],b[1],t)),Math.round(mix(a[2],b[2],t))]}
function rgbCss(v){return `rgb(${v[0]},${v[1]},${v[2]})`}
function tintColor(c,t){return rgbCss(mixRgb(rgbFromHex(c),[255,255,255],t))}
function shadeColor(c,t){return rgbCss(mixRgb(rgbFromHex(c),[0,0,0],t))}
// ── SPHERE — surface-density layer, not a second sphere ─────────────────────
// Base: sphere[] surface particles
// Added density: same surface, barely expanded so it reads as richer particles
function drawSphere(opts={}){
  const now=performance.now();
  let{x:cx=W/2,y:cy=H/2,r=Math.min(W,H)*.22,alpha=1,color,speed=1,
      blast,converge,pointGather,pointExpand,goldBoost=false,darkPct=0,redPct=0,greenPct=0,whitePct=0}=opts;

  // 렘니스케이트 + 폰 기울기 오프셋 (noFloat:true 옵션으로 비활성화 가능)
  if(opts.noFloat!==true && S.lemOff){
    cx += S.lemOff.bx * r * 0.028 + clamp(S.phoneOffset.x,-1,1) * r * 0.10;
    cy += S.lemOff.by * r * 0.028 + clamp(S.phoneOffset.y,-1,1) * r * 0.10;
  }

  const isGold=(goldBoost||(color==='#f7c85f')) && darkPct===0;
  const isRed=redPct>=1 && darkPct>0;
  const isGreen=(color==='#4fd46f' || greenPct>0) && darkPct===0;
  const isDark=darkPct>0 && !isRed;

  const pulse=1+Math.sin(now*.0018)*(isGold?.026:.014);
  r*=pulse;

  const rotY=now*.00035*speed;
  const rotX=Math.sin(now*.00025)*.32;
  const cy2=Math.cos(rotY),sy2=Math.sin(rotY);
  const cx2=Math.cos(rotX),sx2=Math.sin(rotX);

  // 입자 하나를 3D→2D 투영하는 함수
  function project(px,py,pz,radius){
    let x=px*radius, y=py*radius, z=pz*radius;
    if(blast!==undefined){
      const t=ease(clamp(blast));
      const far=Math.max(W,H)*(1.1+Math.abs(sphere[0]?.bx||.5)*.5);
      // blast는 sphere 배열 원소에 bx/by 저장됨 — 인덱스 기반 처리는 아래에서
    }
    let x1=x*cy2-z*sy2, z1=x*sy2+z*cy2;
    let y1=y*cx2-z1*sx2, z2=y*sx2+z1*cx2;
    const dep=z2/(radius*1.2);
    const pers=1/(1.85-dep*.42);
    return{sx:cx+x1*pers*1.38, sy:cy+y1*pers*1.38, dep, pers};
  }

  // 입자색 결정
  function pickColor(px,py,pz,dep,special,specialColor){
    if(special) return specialColor;
    let col;
    if(isGold){
      const k=(dep+1)/2;
      col=k>.88?'#fff8d8':k>.62?'#ffe26f':k>.34?'#ffc12d':'#c97e12';
    } else if(color){
      col=color;
    } else {
      col='#f8fbff';
    }
    if(greenPct>0 && darkPct===0){
      const front=clamp((dep+1)/2);
      const threshold=mix(-1.18,1.35,greenPct);
      const localGreen=ease(clamp((threshold-py)/.34));
      const base=[248,251,255];
      const green=front>.55?[112,226,132]:[54,168,82];
      col=rgbCss(mixRgb(base,green,localGreen));
    }
    if(darkPct>0){
      const bias=clamp(((px+1)/2)*0.6+((py+1)/2)*0.4);
      if(redPct>0){
        const threshold=clamp(1-bias)*0.9;
        const localRed=clamp((redPct-threshold)/(1-threshold+0.001));
        const r2=Math.round(mix(8,195,ease(localRed)));
        const g2=Math.round(mix(8,14,ease(localRed)));
        const b2=Math.round(mix(8,22,ease(localRed)));
        col=`rgb(${r2},${g2},${b2})`;
      } else {
        col='#080808';
      }
    }
    return col;
  }

  // ── 외층 포인트 수집 ─────────────────────────────────────────────────────
  const outer=[];
  for(const p of sphere){
    let px=p.x, py=p.y, pz=p.z;
    let ox=px*r, oy=py*r, oz=pz*r;
    if(blast!==undefined){
      const t=ease(clamp(blast));
      const far=Math.max(W,H)*(1.1+Math.abs(p.bx)*.5);
      ox=mix(ox,p.bx*far,t); oy=mix(oy,p.by*far,t); oz=mix(oz,pz*r*3,t);
      // 투영은 직접 계산
      let x1=ox*cy2-oz*sy2, z1=ox*sy2+oz*cy2;
      let y1=oy*cx2-z1*sx2, z2=oy*sx2+z1*cx2;
      const dep=z2/(r*1.2); const pers=1/(1.85-dep*.42);
      const col=(!p.special && whitePct>0 && stableNoise(p.seed,441)<whitePct)?'#f8fbff':pickColor(px,py,pz,dep,p.special,p.color);
      outer.push({sx:cx+x1*pers*1.38,sy:cy+y1*pers*1.38,dep,s:p.s*(1+dep*.25)*1.3,col,special:p.special});
      continue;
    }
    if(converge!==undefined){
      const t=ease(clamp(converge));
      const far=Math.max(W,H)*(1.0+Math.abs(p.bx)*.5);
      ox=mix(p.bx*far,ox,t); oy=mix(p.by*far,oy,t); oz=mix(pz*r*3,oz,t);
      let x1=ox*cy2-oz*sy2, z1=ox*sy2+oz*cy2;
      let y1=oy*cx2-z1*sx2, z2=oy*sx2+z1*cx2;
      const dep=z2/(r*1.2); const pers=1/(1.85-dep*.42);
      const col=(!p.special && whitePct>0 && stableNoise(p.seed,441)<whitePct)?'#f8fbff':pickColor(px,py,pz,dep,p.special,p.color);
      outer.push({sx:cx+x1*pers*1.38,sy:cy+y1*pers*1.38,dep,s:p.s*(1+dep*.25)*1.3,col,special:p.special});
      continue;
    }
    if(pointGather!==undefined || pointExpand!==undefined){
      const g=ease(clamp(pointGather??1));
      const e=ease(clamp(pointExpand??0));
      const far=Math.max(W,H)*(1.0+Math.abs(p.bx)*.5);
      const pointR=r*.045;
      const fromX=p.bx*far, fromY=p.by*far, fromZ=pz*r*3;
      const pointX=px*pointR, pointY=py*pointR, pointZ=pz*pointR;
      ox=mix(mix(fromX,pointX,g),ox,e);
      oy=mix(mix(fromY,pointY,g),oy,e);
      oz=mix(mix(fromZ,pointZ,g),oz,e);
      let x1=ox*cy2-oz*sy2, z1=ox*sy2+oz*cy2;
      let y1=oy*cx2-z1*sx2, z2=oy*sx2+z1*cx2;
      const dep=z2/(r*1.2); const pers=1/(1.85-dep*.42);
      const col=(!p.special && whitePct>0 && stableNoise(p.seed,441)<whitePct)?'#f8fbff':pickColor(px,py,pz,dep,p.special,p.color);
      outer.push({sx:cx+x1*pers*1.38,sy:cy+y1*pers*1.38,dep,s:p.s*(1+dep*.25)*1.3,col,special:p.special});
      continue;
    }
    let x1=ox*cy2-oz*sy2, z1=ox*sy2+oz*cy2;
    let y1=oy*cx2-z1*sx2, z2=oy*sx2+z1*cx2;
    const dep=z2/(r*1.2); const pers=1/(1.85-dep*.42);
    const col=(!p.special && whitePct>0 && stableNoise(p.seed,441)<whitePct)?'#f8fbff':pickColor(px,py,pz,dep,p.special,p.color);
    outer.push({sx:cx+x1*pers*1.38,sy:cy+y1*pers*1.38,dep,s:p.s*(1+dep*.25)*1.3,col,special:p.special});
  }

  outer.sort((a,b)=>a.dep-b.dep);

  ctx.save();
  ctx.globalAlpha=alpha;

  // ── 외부 glow halo ──────────────────────────────────────────────────────
  const glowR=isGold?r*3.0:r*2.0;
  const grd=ctx.createRadialGradient(cx,cy,r*.05,cx,cy,glowR);
  if(isGold){
    grd.addColorStop(0,'rgba(255,254,215,.78)');
    grd.addColorStop(.15,'rgba(255,225,85,.58)');
    grd.addColorStop(.4,'rgba(247,175,32,.25)');
    grd.addColorStop(.7,'rgba(247,200,95,.08)');
    grd.addColorStop(1,'rgba(247,200,95,0)');
  } else if(isRed){
    grd.addColorStop(0,'rgba(220,18,28,.0)'); // 내부는 별도 core로
    grd.addColorStop(.3,'rgba(180,12,20,.0)');
    grd.addColorStop(1,'rgba(160,8,16,0)');
  } else if(darkPct>0){
    grd.addColorStop(0,'rgba(28,28,30,.06)');
    grd.addColorStop(1,'rgba(20,20,22,0)');
  } else if(color==='#9f1424'||color==='#bf1830'){
    grd.addColorStop(0,'rgba(180,20,36,.4)');
    grd.addColorStop(.5,'rgba(120,12,24,.14)');
    grd.addColorStop(1,'rgba(120,12,24,0)');
  } else {
    // 흰색 스피어
    grd.addColorStop(0,'rgba(210,225,255,.28)');
    grd.addColorStop(.45,'rgba(200,218,255,.10)');
    grd.addColorStop(1,'rgba(200,218,255,0)');
  }
  ctx.fillStyle=grd;
  ctx.beginPath();ctx.arc(cx,cy,glowR,0,7);ctx.fill();

  // ── 내부 core glow ───────────────────────────────────────────────────────
  if(isGold){
    const core=ctx.createRadialGradient(cx,cy,0,cx,cy,r*.62);
    core.addColorStop(0,'rgba(255,254,230,.42)');
    core.addColorStop(.5,'rgba(255,235,100,.18)');
    core.addColorStop(1,'rgba(255,220,80,0)');
    ctx.fillStyle=core;
    ctx.beginPath();ctx.arc(cx,cy,r*.62,0,7);ctx.fill();
  } else if(isRed){
    // 빨간 스피어 내부 붉은 core glow
    const core=ctx.createRadialGradient(cx,cy,0,cx,cy,r*.75);
    core.addColorStop(0,`rgba(255,30,20,${.55*(1-whitePct)})`);
    core.addColorStop(.3,`rgba(220,15,18,${.32*(1-whitePct)})`);
    core.addColorStop(.65,`rgba(180,8,14,${.14*(1-whitePct)})`);
    core.addColorStop(1,'rgba(160,5,10,0)');
    ctx.fillStyle=core;
    ctx.beginPath();ctx.arc(cx,cy,r*.75,0,7);ctx.fill();
    // 바깥 붉은 halo
    const halo=ctx.createRadialGradient(cx,cy,r*.5,cx,cy,r*2.2);
    halo.addColorStop(0,`rgba(200,12,18,${.22*(1-whitePct)})`);
    halo.addColorStop(.5,`rgba(160,8,14,${.08*(1-whitePct)})`);
    halo.addColorStop(1,'rgba(140,5,10,0)');
    ctx.fillStyle=halo;
    ctx.beginPath();ctx.arc(cx,cy,r*2.2,0,7);ctx.fill();
    if(whitePct>0){
      const whiteCore=ctx.createRadialGradient(cx,cy,0,cx,cy,r*.6);
      whiteCore.addColorStop(0,`rgba(230,238,255,${.22*whitePct})`);
      whiteCore.addColorStop(1,'rgba(210,225,255,0)');
      ctx.fillStyle=whiteCore;
      ctx.beginPath();ctx.arc(cx,cy,r*.6,0,7);ctx.fill();
    }
  } else if(!isGold && darkPct===0){
    // 흰 스피어 내부 soft core
    const core=ctx.createRadialGradient(cx,cy,0,cx,cy,r*.55);
    core.addColorStop(0,'rgba(230,238,255,.22)');
    core.addColorStop(1,'rgba(210,225,255,0)');
    ctx.fillStyle=core;
    ctx.beginPath();ctx.arc(cx,cy,r*.55,0,7);ctx.fill();
  }
  // ── 표면 밀도 보강 레이어: 같은 겉면에 아주 얇게 입자만 추가 ─────────────
  for(const p of outer){
    if(p.special) continue;
    const a=clamp((p.dep+1)*.10+.035,.035,.22)*alpha;
    const sx=cx+(p.sx-cx)*1.018;
    const sy=cy+(p.sy-cy)*1.018;
    ctx.fillStyle=rgba(p.col,a);
    ctx.beginPath();ctx.arc(sx,sy,Math.max(.55,p.s*.52),0,7);ctx.fill();
  }

  // ── 외층 입자 ────────────────────────────────────────────────────────────
  for(const p of outer){
    const a=clamp((p.dep+1)*.40+.18,.1,1)*(isGold?1.14:1);
    ctx.fillStyle=rgba(p.col,a*alpha);
    ctx.beginPath();ctx.arc(p.sx,p.sy,p.special?p.s*2.0:p.s,0,7);ctx.fill();
  }

  ctx.restore();
}

// ── CASTLE ─────────────────────────────────────────────────────────────────
function drawCastle(prog){
  const t=ease(prog);
  const now=performance.now();
  ctx.save();
  // 성 전체 glow 후광
  const cx=W/2, topY=castlePts.reduce((m,p)=>Math.min(m,p.y),H);
  const grd=ctx.createRadialGradient(cx,topY+60,0,cx,topY+60,Math.min(W,H)*.55);
  grd.addColorStop(0,`rgba(255,248,180,${.14*t})`);
  grd.addColorStop(.5,`rgba(247,200,95,${.06*t})`);
  grd.addColorStop(1,'rgba(247,200,95,0)');
  ctx.fillStyle=grd; ctx.fillRect(0,0,W,H);
  // 입자 그리기
  for(const p of castlePts){
    const pulse=Math.sin(now*.0009+p.seed)*.5+.5;
    const goldK=pulse;
    const r=goldK>.6?255:247, g=goldK>.6?248:200, b=goldK>.6?200:95;
    const alpha=clamp(.28+.68*t);
    ctx.fillStyle=`rgba(${r},${g},${b},${alpha})`;
    ctx.beginPath(); ctx.arc(p.x,p.y,1.3+t*.7,0,7); ctx.fill();
  }
  ctx.restore();
}

// ── WHITE CRACK TRANSITION ──────────────────────────────────────────────────
function drawShatter(prog){
  const t=clamp(prog);
  const step=Math.min(8,Math.floor(t*8)+1);
  const local=ease((t*8)%1);
  const reveal=(i,total)=>{
    if(t>=.995) return 1;
    const crackStep=Math.floor(i/total*8);
    return clamp((step-1+local-crackStep)/.8);
  };
  ctx.save();
  ctx.fillStyle='#f7fbff';
  ctx.fillRect(0,0,W,H);

  const cx=W*.5, cy=H*.5;
  const impactR=Math.min(W,H)*(.035+.055*ease(clamp(t*1.5)));
  ctx.save();
  ctx.globalAlpha=.18+.28*t;
  for(let ring=0;ring<3;ring++){
    const rr=impactR*(1+ring*.45);
    ctx.strokeStyle=`rgba(20,24,34,${(.28-ring*.07)*t})`;
    ctx.lineWidth=1.1-ring*.18;
    ctx.beginPath();
    for(let i=0;i<=64;i++){
      const a=i/64*Math.PI*2;
      const wob=1+(stableNoise(i+ring*100,72)-.5)*.16;
      const x=cx+Math.cos(a)*rr*wob;
      const y=cy+Math.sin(a)*rr*wob;
      if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    }
    ctx.stroke();
  }
  ctx.restore();

  const rayCount=54;
  for(let i=0;i<rayCount;i++){
    const gate=reveal(i,rayCount);
    if(gate<=0) continue;
    const a=i*(Math.PI*2/rayCount)+(stableNoise(i,61)-.5)*.24;
    const len=Math.max(W,H)*mix(.18,.98,stableNoise(i,62))*ease(gate);
    const bend=(stableNoise(i,63)-.5)*Math.min(W,H)*.08;
    ctx.strokeStyle=`rgba(12,14,24,${(.12+.56*t)*gate})`;
    ctx.lineWidth=.55+1.45*stableNoise(i,64);
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(a)*impactR*.45,cy+Math.sin(a)*impactR*.45);
    const segments=3+Math.floor(stableNoise(i,65)*3);
    for(let s=1;s<=segments;s++){
      const k=s/segments;
      const wob=(stableNoise(i*13+s,66)-.5)*bend*k;
      const x=cx+Math.cos(a)*len*k+Math.cos(a+Math.PI/2)*wob;
      const y=cy+Math.sin(a)*len*k+Math.sin(a+Math.PI/2)*wob;
      ctx.lineTo(x,y);
    }
    ctx.stroke();

    if(gate>.36){
      const branches=1+Math.floor(stableNoise(i,67)*3);
      for(let b=0;b<branches;b++){
        const k=mix(.28,.82,stableNoise(i*7+b,68));
        const ba=a+(stableNoise(i*11+b,69)>.5?1:-1)*mix(.35,1.0,stableNoise(i*17+b,70));
        const bl=len*mix(.12,.34,stableNoise(i*19+b,71))*gate;
        const sx=cx+Math.cos(a)*len*k;
        const sy=cy+Math.sin(a)*len*k;
        ctx.strokeStyle=`rgba(12,14,24,${(.08+.36*t)*gate})`;
        ctx.lineWidth=.45+stableNoise(i*23+b,72)*.75;
        ctx.beginPath();
        ctx.moveTo(sx,sy);
        ctx.lineTo(sx+Math.cos(ba)*bl,sy+Math.sin(ba)*bl);
        ctx.stroke();
      }
    }
  }

  const ringCount=5;
  for(let ring=0;ring<ringCount;ring++){
    const gate=reveal(ring+18,rayCount);
    if(gate<=0) continue;
    const rr=Math.min(W,H)*mix(.12,.46,ring/(ringCount-1))*ease(gate);
    ctx.strokeStyle=`rgba(12,14,24,${(.05+.18*t)*gate})`;
    ctx.lineWidth=.45;
    ctx.beginPath();
    for(let i=0;i<=80;i++){
      const a=i/80*Math.PI*2;
      if(stableNoise(i+ring*200,73)<.18) continue;
      const wob=1+(stableNoise(i+ring*200,74)-.5)*.22;
      const x=cx+Math.cos(a)*rr*wob;
      const y=cy+Math.sin(a)*rr*wob;
      if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    }
    ctx.stroke();
  }

  ctx.globalAlpha=clamp(1-t*1.18,0,1);
  ctx.fillStyle='#f7fbff';
  ctx.fillRect(0,0,W,H);
  ctx.restore();
}
// ── DARK ALLEY ──────────────────────────────────────────────────────────────
function drawAlley(prog, opts={}){
  const noTriangles=!!opts.noTriangles;
  const noWeather=!!opts.noWeather;
  const bgAlpha=opts.bgAlpha===undefined?1:clamp(opts.bgAlpha);
  const weatherAlpha=opts.weatherAlpha===undefined?1:clamp(opts.weatherAlpha);
  const now=performance.now();
  ctx.save();
  ctx.globalAlpha=bgAlpha;
  // Background
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#040406'); g.addColorStop(.5,'#0d0d0f'); g.addColorStop(1,'#0a0a0b');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  if(!noTriangles){
    // Wall left
    ctx.fillStyle='#111013';
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(W*.42,0); ctx.lineTo(W*.33,H*.52); ctx.lineTo(0,H*.72); ctx.fill();
    // Wall right
    ctx.fillStyle='#101012';
    ctx.beginPath(); ctx.moveTo(W,0); ctx.lineTo(W*.58,0); ctx.lineTo(W*.67,H*.52); ctx.lineTo(W,H*.72); ctx.fill();
  }

  // Glossy floor: reflective horizontal gradient
  const floor=ctx.createLinearGradient(0,H*.54,0,H);
  floor.addColorStop(0,'#1a1a1e'); floor.addColorStop(.3,'#141416'); floor.addColorStop(1,'#0a0a0c');
  ctx.fillStyle=floor;
  ctx.fillRect(0,H*.54,W,H-H*.54);

  // Floor reflection sheen lines
  ctx.save(); ctx.globalAlpha=.12;
  for(let y=H*.56;y<H;y+=28){
    ctx.strokeStyle='rgba(255,255,255,.18)';
    ctx.lineWidth=.8;
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y+16); ctx.stroke();
  }
  ctx.restore();
  ctx.restore();

  if(!noWeather){
    // Rain
    const rainAlpha=clamp(prog*1.6,.0,1)*weatherAlpha;
    ctx.save(); ctx.globalAlpha=rainAlpha;
    ctx.strokeStyle='rgba(180,210,230,.32)'; ctx.lineWidth=.9;
    for(const r of rain){
      r.y+=r.v*(1+prog*.8); r.x-=1.8;
      if(r.y>H+40){r.y=-40;r.x=rnd(W)}
      ctx.beginPath(); ctx.moveTo(r.x,r.y); ctx.lineTo(r.x-5,r.y+r.l); ctx.stroke();
    }
    ctx.restore();

    // Lightning flash (screen-wide, no bolt shape): less frequent, longer, softer
    const flashWindow=2100;
    const flashIndex=Math.floor(now/flashWindow);
    const flashPhase=(now%flashWindow)/flashWindow;
    const flashHit=stableNoise(flashIndex,811)>.74;
    if(flashHit && flashPhase<.18){
      const flashEase=Math.sin((flashPhase/.18)*Math.PI);
      ctx.fillStyle=`rgba(245,248,255,${.18*flashEase*weatherAlpha})`;
      ctx.fillRect(0,0,W,H);
    }
  }
}
// ── SUNSET ──────────────────────────────────────────────────────────────────
function drawSunset(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#6b3e6e'); g.addColorStop(.34,'#d8854a'); g.addColorStop(.62,'#b86e3c'); g.addColorStop(1,'#5b321c');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#8a532a';
  ctx.beginPath(); ctx.moveTo(0,H*.72);
  for(let x=0;x<=W;x+=72)ctx.lineTo(x,H*.64+Math.sin(x*.006)*42);
  ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.fill();
  ctx.fillStyle='rgba(68,40,20,.5)';
  ctx.beginPath(); ctx.moveTo(0,H*.82);
  for(let x=0;x<=W;x+=72)ctx.lineTo(x,H*.78+Math.sin(x*.008+2)*32);
  ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.fill();
}

function drawDust(){
  ctx.save(); ctx.globalAlpha=.5;
  for(const d of dust){
    d.y+=d.v; d.x+=Math.sin(performance.now()*.001+d.z)*1.8;
    if(d.y>H){d.y=H*.46;d.x=rnd(W)}
    ctx.fillStyle=`rgba(152,96,50,${.14+d.z*.32})`;
    ctx.beginPath(); ctx.arc(d.x,d.y,d.r*(1+d.z),0,7); ctx.fill();
  }
  ctx.restore();
}

// ── CROSS (3D depth illusion via z-ordered particles) ────────────────────────
function drawCross(closeup=0){
  ctx.save();
  for(const p of crossPts){
    const persp=1/(1+(p.z||0)*.0018-closeup*.2);
    let x=mix(p.x, W*.5+(p.x-W*.66)*2.5, closeup)*persp+(1-persp)*W/2;
    let y=mix(p.y, H*.5+(p.y-H*.52)*2.1, closeup)*persp+(1-persp)*H/2;
    const dep=clamp((p.z||0)/80+.5);
    const r=stableNoise(p.seed,1);
    const col=r>.68?'rgba(80,48,24,':'r>.38'?'rgba(60,36,16,':'rgba(50,28,12,';
    ctx.fillStyle=`rgba(${r>.68?'80,48,24':r>.38?'60,36,16':'48,28,12'},${.32+.6*persp})`;

    ctx.beginPath(); ctx.arc(x,y,stableNoise(i,102)*2.4+.5,0,7); ctx.fill();

  ctx.fillStyle=palmShadow; ctx.beginPath(); ctx.arc(0,0,Math.min(W,H)*.18,0,7); ctx.fill();
  ctx.restore();

  // Nail descends and drives in
  const nailProgress=clamp(p*1.8); // faster than chapter progress
  const nCx=W*.5, nBaseY=H*.26;
  const nLen=Math.min(W,H)*.38;
  // Nail travels down and partially embeds
  const nailY=mix(H*.08, H*.46, ease(nailProgress));
  ctx.save(); ctx.translate(nCx,nailY); ctx.rotate(-.05);
  for(let i=0;i<640;i++){
    const t=stableNoise(i,103);
    const x=(stableNoise(i,104)-.5)*(10+30*(1-t));
    const y=mix(-nLen*.48,nLen*.48,t);
    ctx.fillStyle=`rgba(6,6,8,${.3+.65*t})`;
    ctx.beginPath(); ctx.arc(x,y,stableNoise(i,105)*2+.5,0,7); ctx.fill();
  }
  ctx.globalAlpha=.07;
  ctx.fillStyle='rgba(255,255,255,1)';
  ctx.fillRect(-3,-nLen*.44,5,nLen*.68);

  // Impact flash when nail hits — screen shake implied by vignette pulse
  if(nailProgress>.82){
    const impPulse=Math.sin((nailProgress-.82)/.18*Math.PI);
    ctx.fillStyle=`rgba(255,255,255,${.22*impPulse})`;
    ctx.fillRect(0,0,W,H);
    // Radial impact burst
    ctx.save(); ctx.translate(W*.5,H*.5);
    for(let i=0;i<200;i++){
      const a=stableNoise(i,106)*Math.PI*2;

      ctx.beginPath(); ctx.arc(Math.cos(a)*dist,Math.sin(a)*dist,1.5,0,7); ctx.fill();
    }
    ctx.restore();

  // Initial flash
  if(p<.18){
    ctx.fillStyle=`rgba(255,255,255,${.32*(1-p/.18)})`;
    ctx.fillRect(0,0,W,H);
  }
}

// ── PROTOTYPE: BLOOD DROPLET TO RED SPHERE ─────────────────────────────────────
// Droplet falls, wind particles rush UP past it (cinematic slow-motion feel)
function drawPrototypeBloodDroplet(prog){
  const now=performance.now();
  const p=ease(prog);

  // Black BG
  ctx.fillStyle='#030204'; ctx.fillRect(0,0,W,H);

  // Wind particles streaming UPWARD (strong, visible)
  ctx.save();
  for(const w of wind){
    w.y-=w.v*1.6;
    if(w.y<-30){w.y=H+30; w.x=rnd(W)}
    const brightness=Math.sin(now*.001+w.x*.003)*.5+.5;
    ctx.fillStyle=`rgba(${Math.round(mix(180,230,brightness))},${Math.round(mix(190,235,brightness))},${Math.round(mix(210,250,brightness))},${w.a*.9})`;
    ctx.beginPath(); ctx.arc(w.x,w.y,w.r,0,7); ctx.fill();
  }
  ctx.restore();

  // Droplet descends slowly
  const dropletY=mix(H*.12,H*.52,p);
  const dropletScale=mix(.28,1.05,p);

  // Red atmospheric glow around droplet
  const glowR=Math.min(W,H)*(.18+.28*p);
  const grd=ctx.createRadialGradient(W/2,dropletY,0,W/2,dropletY,glowR);
  grd.addColorStop(0,'rgba(180,15,30,.38)');
  grd.addColorStop(.45,'rgba(140,8,20,.14)');
  grd.addColorStop(1,'rgba(100,5,15,0)');
  ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(W/2,dropletY,glowR,0,7); ctx.fill();

  // Teardrop-shaped particle cluster
  ctx.save(); ctx.translate(W/2,dropletY); ctx.scale(dropletScale,dropletScale);
  for(let i=0;i<520;i++){
    const a=i*2.399963+Math.sin(i)*.02;
    const rr=Math.sqrt(i/520);
    let px=Math.cos(a)*rr*34;
    let py=Math.sin(a)*rr*40+8;
    const tap=clamp((py+40)/90);
    px*=mix(.28,1,Math.sin(tap*Math.PI));
    py-=Math.pow(1-rr,1.9)*44;
    const tw=Math.sin(now*.003+i)*1.4;
    // Colour layers: bright crimson core → deep red edge
    const cr=Math.round(mix(220,120,rr));
    const cg=Math.round(mix(20,5,rr));
    const cb=Math.round(mix(35,15,rr));
    ctx.fillStyle=`rgba(${cr},${cg},${cb},${.26+.6*(1-rr*.42)})`;
    ctx.beginPath(); ctx.arc(px+tw,py,1.1+1.9*(1-rr),0,7); ctx.fill();
  }
  ctx.restore();
}

// ── PROTOTYPE: WAITING FLOOR ───────────────────────────────────────────────────
// Camera arrives first. Mirror floor, horizon line, sphere NOT yet visible.
function drawPrototypeWaitingFloor(prog){
  const now=performance.now();

  // Deep black space
  ctx.fillStyle='#020203'; ctx.fillRect(0,0,W,H);

  // Horizon line
  const baseHorizonY=H*.55;

  ctx.strokeStyle=`rgba(255,255,255,${.4+Math.sin(now*.0012)*.08})`; ctx.lineWidth=.8;
  ctx.beginPath(); ctx.moveTo(0,horizY); ctx.lineTo(W,horizY); ctx.stroke();

  // Mirror floor gradient (below horizon)
  const floorGrd=ctx.createLinearGradient(0,horizY,0,H);
  floorGrd.addColorStop(0,'rgba(255,255,255,.09)');

  floorGrd.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=floorGrd; ctx.fillRect(0,horizY,W,H-horizY);

  // Glossy floor reflection lines (perspective lines converging to horizon)
  ctx.save(); ctx.globalAlpha=.1;
  for(let i=0;i<12;i++){
    const x=W/2+(i-5.5)*W*.08;

    ctx.beginPath(); ctx.moveTo(x,horizY); ctx.lineTo(W/2+(x-W/2)*8,H); ctx.stroke();

  // Faint red glow appearing at the top — hinting the droplet is coming
  const hint=clamp(p*1.8-.2);
  if(hint>0){
    const hg=ctx.createRadialGradient(W/2,-20,0,W/2,-20,H*.45);
    hg.addColorStop(0,`rgba(160,10,25,${.22*hint})`);
    hg.addColorStop(1,'rgba(160,10,25,0)');
    ctx.fillStyle=hg; ctx.fillRect(0,0,W,H*.5);

  // Pulse effect — subtle brightness ripple on floor
  const pulse=Math.sin(now*.0014)*.5+.5;
  ctx.fillStyle=`rgba(255,255,255,${.025*pulse})`;
  ctx.fillRect(0,horizY,W,H-horizY);
}

  // Grass fringe
  for(let i=0;i<260;i++){

  }
  // Dirt — rows
  const rows=Math.max(18,Math.floor(blockH/16));
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const i=12000+r*cols+c;
      const x=left+(c+.5+stableNoise(i,1)*.5)/cols*width;
      const y=topY+8+(r+.4+stableNoise(i,2)*.5)/rows*(H-topY-8);

      ctx.beginPath(); ctx.arc(x,y,2+stableNoise(i,5)*2.8,0,7); ctx.fill();
    }
  }
  ctx.restore();
}

    const aura=ctx.createRadialGradient(W/2,H*.5,R*.10,W/2,H*.5,R*.52);
    aura.addColorStop(0,`rgba(235,255,228,${.18*greenAura})`);
    aura.addColorStop(.28,`rgba(114,220,118,${.12*greenAura})`);
    aura.addColorStop(.7,`rgba(48,116,62,${.05*greenAura})`);
    aura.addColorStop(1,'rgba(48,116,62,0)');

  }

  drawSphere({x:W/2, y:H*.5, r:R*.19, color:'#f8fbff', speed:.55, alpha:1});

  drawBareSoilHill(topY,hillQ,false,0);
}

function drawBareSoilHill(topY, rise=1, withGrass=false, grow=0){
  const left=W*.05, right=W*.95, width=right-left;
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(0,H);
  ctx.lineTo(0,topY+H*.08);
  for(let i=0;i<=96;i++){
    const t=i/96;
    const x=mix(0,W,t);
    const mound=Math.sin(t*Math.PI)*H*.13;
    const y=topY-mound*rise+(stableNoise(i,71)-.5)*H*.016*rise;
    ctx.lineTo(x,y);
  }
  ctx.lineTo(W,H);
  ctx.closePath();
  ctx.clip();

  const soil=ctx.createLinearGradient(0,topY-H*.1,0,H);
  soil.addColorStop(0,'#8a5a2e'); soil.addColorStop(.48,'#5d3a20'); soil.addColorStop(1,'#2f2118');
  ctx.fillStyle=soil; ctx.fillRect(0,topY-H*.14,W,H);

  const cols=Math.max(74,Math.floor(width/13));
  const rows=Math.max(22,Math.floor((H-topY)/13));
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const i=31000+r*cols+c;
      const x=left+(c+.5+stableNoise(i,1)*.5)/cols*width;
      const ridge=topY-Math.sin((x/W)*Math.PI)*H*.13*rise;
      const y=ridge+8+(r+.35+stableNoise(i,2)*.5)/rows*(H-ridge-8);
      const k=stableNoise(i,3);
      const col=k>.7?'122,78,38':k>.36?'91,57,30':'63,42,26';
      ctx.fillStyle=`rgba(${col},${.35+stableNoise(i,4)*.42})`;
      ctx.beginPath(); ctx.arc(x,y,1.6+stableNoise(i,5)*2.8,0,7); ctx.fill();
    }
  }
  ctx.restore();

  if(withGrass){
    ctx.save();
    const a=clamp(grow*1.35);
    for(let i=0;i<300*a;i++){
      const t=stableNoise(i,81);
      const x=mix(W*.06,W*.94,t);
      const ridge=topY-Math.sin((x/W)*Math.PI)*H*.13;
      const h=(6+stableNoise(i,82)*30)*a;
      const sway=(stableNoise(i,83)-.5)*10;
      const steps=3+Math.floor(stableNoise(i,87)*5);
      for(let s=0;s<steps;s++){
        const k=s/(steps-1||1);
        const px=x+sway*k;
        const py=ridge+4-h*k;
        const gr=stableNoise(i*17+s,88);
        ctx.fillStyle=`rgba(${Math.round(mix(64,128,gr))},${Math.round(mix(132,214,gr))},${Math.round(mix(48,90,gr))},${(.18+.58*a)*(1-k*.18)})`;
        ctx.beginPath(); ctx.arc(px,py,.9+stableNoise(i*17+s,89)*2.1,0,7); ctx.fill();
      }
    }
    ctx.restore();
  }
}

function drawGrassCover(topY,grow=0,originX=W/2){
  const q=clamp(grow);
  if(q<=0) return;
  const left=W*.04, right=W*.96, width=right-left;
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(0,H);
  ctx.lineTo(0,topY+H*.08);
  for(let i=0;i<=120;i++){
    const t=i/120;
    const x=mix(0,W,t);
    const y=topY-Math.sin(t*Math.PI)*H*.13+(stableNoise(i,171)-.5)*H*.012;
    ctx.lineTo(x,y);
  }
  ctx.lineTo(W,H);
  ctx.closePath();
  ctx.clip();

  const cols=Math.max(40,Math.floor(width/22));
  const rows=Math.max(10,Math.floor((H-topY)/24));
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const i=52000+r*cols+c;
      const x=left+(c+.5+stableNoise(i,1)*.55)/cols*width;
      const ridge=topY-Math.sin((x/W)*Math.PI)*H*.13;
      const y=ridge+3+(r+.35+stableNoise(i,2)*.55)/rows*(H-ridge-3);
      const fromCenter=clamp(Math.abs(x-originX)/(W*.52));
      const vertical=clamp((y-ridge)/(H-ridge));
      const wave=clamp(q*1.55-fromCenter*.78-vertical*.28+.2);
      const local=ease(wave);
      if(local<=0) continue;
      const gr=stableNoise(i,3);
      const deep=vertical>.55?.18:0;
      const rr=Math.round(mix(42,106,gr)-deep*30);
      const gg=Math.round(mix(118,214,gr)-deep*42);
      const bb=Math.round(mix(44,82,gr)-deep*20);
      ctx.fillStyle=`rgba(${rr},${gg},${bb},${(.28+.62*local)})`;
      ctx.beginPath();ctx.arc(x,y,3.2+stableNoise(i,4)*4.2,0,7);ctx.fill();
    }
  }

  const flowerColors=['#ff6b9a','#ef4444','#facc15'];
  if(q>.58){
    const bloom=ease(clamp((q-.58)/.42));
    for(let i=0;i<42;i++){
      const x=mix(W*.07,W*.93,stableNoise(i,181));
      const ridge=topY-Math.sin((x/W)*Math.PI)*H*.13;
      const fromCenter=clamp(Math.abs(x-originX)/(W*.52));
      const wave=clamp(bloom*1.35-fromCenter*.72+.18);
      if(wave<=0 || stableNoise(i,182)<.44) continue;
      const y=ridge+H*.015+stableNoise(i,183)*H*.28;
      const col=flowerColors[i%flowerColors.length];
      ctx.fillStyle=col;
      ctx.globalAlpha=.34+.48*ease(wave);
      const petals=5+Math.floor(stableNoise(i,184)*5);
      for(let p=0;p<petals;p++){
        const a=stableNoise(i*17+p,185)*Math.PI*2;
        const rr=Math.sqrt(stableNoise(i*17+p,186))*5.5*ease(wave);
        ctx.beginPath();ctx.arc(x+Math.cos(a)*rr,y+Math.sin(a)*rr,.8+stableNoise(i*17+p,187)*1.4,0,7);ctx.fill();
      }
    }
    ctx.globalAlpha=1;
  }
  ctx.restore();
}

function drawParticleGrowth(topY,grow,originX=W/2,originY=H*.40,originR=Math.min(W,H)*.14){
  const q=clamp(grow);
  ctx.save();
  const flowerColors=['#ff6b9a','#ef4444','#facc15'];
  for(let i=0;i<30;i++){
    const x=mix(W*.08,W*.92,stableNoise(i,92));
    const ridge=topY-Math.sin((x/W)*Math.PI)*H*.13;
    const dist=Math.hypot((x-originX)/W,(ridge-originY)/H);
    const wave=clamp((q*1.45-dist*1.9+.12));
    const local=ease(wave);
    if(local<=0) continue;
    const h=(12+stableNoise(i,93)*52)*local;
    const bend=(stableNoise(i,94)-.5)*18;

    const steps=3+Math.floor(stableNoise(i,95)*5);
    for(let s=0;s<steps;s++){
      const t=s/(steps-1);
      const px=x+bend*t*.45+Math.sin(t*Math.PI)*bend*.12;
      const py=ridge-h*t;
      const depth=.55+.45*(1-dist);
      ctx.fillStyle=`rgba(78,196,86,${(.18+.64*t)*local*depth})`;
      ctx.beginPath(); ctx.arc(px,py,.9+stableNoise(i*31+s,96)*2.0,0,7); ctx.fill();
    }

    if(local>.68 && stableNoise(i,97)>.62){
      const bloom=clamp((local-.68)/.32);
      const fx=x+bend*.44;
      const fy=ridge-h;
      ctx.fillStyle=flowerColors[i%flowerColors.length];
      const petalCount=8+Math.floor(stableNoise(i,101)*7);
      for(let p=0;p<petalCount;p++){
        const a=stableNoise(i*101+p,98)*Math.PI*2;
        const rr=Math.sqrt(stableNoise(i*101+p,99))*4.6*bloom;
        ctx.globalAlpha=(.36+.54*bloom)*(0.8+0.2*(1-dist));
        ctx.beginPath(); ctx.arc(fx+Math.cos(a)*rr,fy+Math.sin(a)*rr,0.9+stableNoise(i*101+p,100)*1.55,0,7); ctx.fill();
      }
      ctx.globalAlpha=1;
    }
  }
  ctx.restore();
}
function drawFallingRedTrail(cx,cy,r,fall){
  ctx.save();
  const q=clamp(fall);
  const now=performance.now();
  ctx.globalCompositeOperation='lighter';

  // Continuous particle wisps: roots follow a deeper sphere arc, then animated
  // particles are emitted upward from those roots.
  const streams=32;
  const maxHeight=r*mix(.9,2.08,q);
  for(let s=0;s<streams;s++){
    const side=mix(-.86,.86,s/(streams-1));
    const centerWeight=1-Math.min(1,Math.abs(side)/.86);
    const dx=side*r;
    const surfaceY=cy-Math.sqrt(Math.max(0,r*r-dx*dx));
    const originX=cx+dx;
    const originY=surfaceY+r*mix(.18,.055,centerWeight)+r*.16;
    const h=maxHeight*mix(.64,1.34,centerWeight)*(0.88+stableNoise(s,231)*.22);
    const lean=(stableNoise(s,232)-.5)*r*mix(.3,.12,centerWeight);
    const samples=14+Math.floor(18*mix(.55,1,centerWeight));
    const phase=(now*.0016+stableNoise(s,233))*Math.PI*2;

    for(let j=0;j<samples;j++){
      const t=j/(samples-1);
      const density=.62+.38*(t<.22 ? t/.22 : 1);
      const wave=Math.sin(phase+t*5.6)*r*.018*(1+t*.72);
      const jitter=(stableNoise(s*97+j,234)-.5)*r*.042*(1+t*.42);
      const x=originX+lean*t+wave+jitter;
      const y=originY-h*t+r*.035*Math.sin(t*Math.PI);
      const fade=1-t*.72;
      const hot=stableNoise(s*97+j,235);
      const rr=Math.round(mix(165,240,hot));
      const gg=Math.round(mix(7,30,hot));
      const bb=Math.round(mix(13,34,hot));
      const alpha=(.18+.56*fade)*q*(.78+.30*centerWeight)*density;
      const size=(1.25+stableNoise(s*97+j,236)*2.55)*(1-t*.24)*(1+.06*centerWeight);
      ctx.fillStyle=`rgba(${rr},${gg},${bb},${alpha})`;
      ctx.beginPath();ctx.arc(x,y,size,0,7);ctx.fill();
    }

    const emitters=4+Math.floor(centerWeight*3);
    for(let e=0;e<emitters;e++){
      const life=(now*.00046+stableNoise(s*31+e,237))%1;
      const rise=h*(life*.82+.03);
      const sway=Math.sin(phase+life*6.8+e)*r*.05*(1+life*.7);
      const x=originX+lean*life+sway+(stableNoise(s*47+e,238)-.5)*r*.045;
      const y=originY-rise+r*.06*Math.sin(life*Math.PI);
      const fade=Math.pow(1-life,.72);
      const hot=stableNoise(s*47+e,239);
      const rr=Math.round(mix(180,255,hot));
      const gg=Math.round(mix(8,34,hot));
      const bb=Math.round(mix(12,36,hot));
      const alpha=(.3+.52*fade)*q*(.72+.28*centerWeight);
      const size=(1.45+stableNoise(s*47+e,240)*2.8)*(1-life*.18);
      ctx.fillStyle=`rgba(${rr},${gg},${bb},${alpha})`;
      ctx.beginPath();ctx.arc(x,y,size,0,7);ctx.fill();
    }
  }
  ctx.restore();
}
// ─── Timeline helpers ─────────────────────────────────────────────────────────
// t01(chapterN): returns 0..1 progress within chapter N's segment
function t01(n){
  const start=CK[n-1], end=CK[n];
  return clamp((S.T-start)/(end-start));
}
// tAbs(chapterN): absolute T at start of chapter N
function tStart(n){return CK[n-1];}
function tEnd(n){return CK[n];}
// Is T currently inside chapter N's window?
function inChapter(n){return S.T>=CK[n-1] && S.T<=CK[n]+.001;}
// Crossfade weight between two chapters — how far we are past the chapter boundary
function xfade(fromN,toN,dur=0.6){
  const boundary=CK[fromN];
  return ease(clamp((S.T-boundary)/dur));
}

// ─── GOSPEL SPHERE GALLERY ───────────────────────────────────────────────────
function drawGallery(prog){
  const R=Math.min(W,H);
  // Phase 1 (0→0.35): fade to black
  const blackAlpha=clamp(prog/0.35);
  ctx.save();ctx.globalAlpha=blackAlpha;ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);ctx.restore();
  const showProg=clamp((prog-.35)/.65);
  if(showProg<=0)return;
  const specs=[
    {color:'#f7c85f',hr:[247,200,95], ha:.55,goldBoost:true},
    {color:'#0a0a0a',hr:[248,251,255],ha:.28},
    {color:'#bf1830',hr:[191,24,48],  ha:.55},
    {color:'#f8fbff',hr:[248,251,255],ha:.30},
    {color:'#4fd46f',hr:[79,212,111], ha:.55},
  ];
  const sr=R*.09;
  for(let i=0;i<specs.length;i++){
    const s=specs[i];
    const a=clamp((showProg-i*.14)/.22);
    if(a<=0)continue;
    const cx=W*(i+1)/6, cy=H*.5;
    ctx.save();ctx.globalAlpha=a;
    const gr=ctx.createRadialGradient(cx,cy,0,cx,cy,sr*2.8);
    gr.addColorStop(0,`rgba(${s.hr[0]},${s.hr[1]},${s.hr[2]},${s.ha})`);
    gr.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gr;ctx.beginPath();ctx.arc(cx,cy,sr*2.8,0,7);ctx.fill();
    drawSphere({x:cx,y:cy,r:sr,color:s.color,goldBoost:!!s.goldBoost,speed:.35,alpha:1,noFloat:true});
    ctx.restore();
  }
}

// ─── MAIN RENDER LOOP ────────────────────────────────────────────────────────
function render(){
  requestAnimationFrame(render);
  const now=performance.now();
  const dt=Math.min((now-S.lastRealTime)/1000, .05); // cap at 50ms
  S.lastRealTime=now;

  // Advance T toward Tgt
  const dist=S.Tgt-S.T;
  if(Math.abs(dist)>.001){
    // 재생 속도: 기본 0.5배속, 멀수록 최대 1.6배속
    const speed=clamp(0.5+Math.abs(dist)*0.28,0.5,1.6);
    S.T+=Math.sign(dist)*Math.min(Math.abs(dist),dt*speed);
  } else {
    S.T=S.Tgt; // snap when close
  }

  ctx.clearRect(0,0,W,H);

  // 렘니스케이트(가로 8자) 오프셋 계산 — 매 프레임 갱신
  const _lt=performance.now()*.00038; // ~16.5초 주기
  const _ld=1+Math.sin(_lt)*Math.sin(_lt);
  S.lemOff={bx:Math.cos(_lt)/_ld, by:Math.sin(_lt)*Math.cos(_lt)/_ld*.45};

  const T=S.T;

  // ── Helper: draw the universal background for a given T ──────────────────
  // Each segment blends naturally into the next

  // ── SEGMENT 1: Black cosmos (T 0..4) ────────────────────────────────────
  if(T<=CK[1]){
    const p=t01(1);
    ctx.fillStyle='#030407'; ctx.fillRect(0,0,W,H);
    drawStars(.55+.18*Math.sin(now*.0004));
    drawSphere({speed:.7,color:'#f8fbff'});
  }

  // ── SEGMENT 2: Spin → Blast (T CK[1]..CK[2]) ────────────────────────────
  else if(T<=CK[2]){
    const p=t01(2);
    ctx.fillStyle='#030407'; ctx.fillRect(0,0,W,H);
    drawStars(clamp(1-p*1.4));
    if(p<.72){
      // 초반엔 느리게, 0.72 직전에 폭발적으로 빨라짐
      const spinP=p/.72;
      const speed=mix(0.6, 22, ease3(spinP)); // ease3 = quintic, 끝에 집중
      drawSphere({speed, color:'#f8fbff'});
    } else {
      // Blast 0.72→1.0
      const blast=ease((p-.72)/.28);
      drawSphere({speed:24,color:'#f8fbff',alpha:clamp(1-blast*.6),blast});
    }
  }

  // ── SEGMENT 3: Converge → Gold → White void (T CK[2]..CK[3]) ───────────
  // p 0.00–0.20 : 퍼진 입자들이 다시 모여 금색 스피어로 수렴
  // p 0.20–1.00 : 흰 배경 fade-in, 금색 스피어가 중앙에 안착
  else if(T<=CK[3]){
    const p=t01(3);
    const R=Math.min(W,H);
    const gatherEnd=1.2/CK_DUR[3];
    const holdEnd=gatherEnd+(1.6/CK_DUR[3]);
    const expandEnd=holdEnd+(1.1/CK_DUR[3]);
    if(p<expandEnd){
      // 흩어진 입자가 작은 스피어로 모인 뒤, 천천히 금색 스피어로 안정화
      ctx.fillStyle='#030407'; ctx.fillRect(0,0,W,H);
      const expandQ=clamp((p-holdEnd)/(expandEnd-holdEnd));
      const gatherQ=p<gatherEnd ? clamp(p/gatherEnd) : 1;
      const q=ease(expandQ);
      drawStars(clamp((1-ease(Math.max(gatherQ,q)))*.6));
      drawSphere({speed:mix(10,1.2,q),pointGather:gatherQ,pointExpand:expandQ,
        color:'#f7c85f',goldBoost:true,r:R*.24,alpha:.58+.42*q});
    } else {
      // 흰 무한 공간 fade-in → 장면 4 시작색 #f7fbff(247,251,255)에 맞춤
      const q=ease((p-expandEnd)/(1-expandEnd));
      ctx.fillStyle=`rgb(${Math.round(mix(3,247,q))},${Math.round(mix(3,251,q))},${Math.round(mix(7,255,q))})`;
      ctx.fillRect(0,0,W,H);
      drawSphere({speed:1.1,color:'#f7c85f',goldBoost:true,r:R*.24,alpha:1});
    }
  }

  // ── SEGMENT 4: 추락 (T CK[3]..CK[4]) ────────────────────────────────────
  // Chapter 3 흰 공간에서 바로 이어짐
  // p 0.00–0.20 : 흰 배경 균열 → 검은 배경 (금색 스피어 중앙)
  // p 0.20–1.00 : 검은 골목 + 비 + 스피어 금→검 변화
  else if(T<=CK[4]){
    const p=t01(4);
    const R=Math.min(W,H);

    if(p<.085){
      // 흰 세계 균열 — 1.1초 지속
      const stage=clamp(p/.085);
      const crackEnd=1-(0.6/(CK_DUR[4]*.085));
      const holdEnd=crackEnd+(0.3/(CK_DUR[4]*.085));
      const crackQ=clamp(stage/crackEnd);
      const shakeQ=clamp((stage-holdEnd)/(1-holdEnd));
      const shakeAmp=Math.sin(shakeQ*Math.PI);
      const shakeFrame=Math.floor(performance.now()/26);
      const dx=(stableNoise(shakeFrame,901)-.5)*32*shakeAmp;
      const dy=(stableNoise(shakeFrame,1203)-.5)*24*shakeAmp;
      ctx.save();
      ctx.translate(dx,dy);
      ctx.fillStyle='#f7fbff'; ctx.fillRect(-40,-40,W+80,H+80);
      drawShatter(crackQ);
      drawSphere({x:W/2,y:H*.5,r:R*.24,color:'#f7c85f',goldBoost:crackQ<.4,speed:.8,alpha:1});
      ctx.restore();

    } else {
      // 검은 골목 + 비 + 스피어 금→검
      const q=ease((p-.085)/.915);
      drawAlley(q,{noTriangles:true});
      const darkPct=ease(clamp(q*1.3));

      // 흰색 후광을 스피어보다 먼저(뒤에) 그림
      if(darkPct>.5){
        const t=ease((darkPct-.5)/.5);
        const haloR=R*.22*2.35;
        const innerR=R*.22*.5;
        ctx.save();
        const halo=ctx.createRadialGradient(W*.5,H*.5,innerR,W*.5,H*.5,haloR);
        halo.addColorStop(0,`rgba(235,240,255,${.34*t})`);
        halo.addColorStop(.25,`rgba(220,228,252,${.22*t})`);
        halo.addColorStop(.55,`rgba(200,215,248,${.10*t})`);
        halo.addColorStop(1,'rgba(190,210,245,0)');
        ctx.fillStyle=halo;
        ctx.beginPath();ctx.arc(W*.5,H*.5,haloR,0,7);ctx.fill();
        ctx.restore();
      }

      // 스피어는 후광 위에
      drawSphere({x:W*.5,y:H*.5,r:R*.22,
        color:'#f7c85f',darkPct,
        speed:mix(.8,1.8,q),alpha:1});
    }
  }

  // ── SEGMENT 5: 검은→빨강 그라데이션 변화 (T CK[4]..CK[5]) ──────────────
  // 낙하 없음. 스피어가 오른쪽 아래부터 검정→빨강으로 서서히 물듦
  // p 0.00–0.55 : 오른쪽 아래부터 빨간 입자 번짐
  // p 0.55–1.00 : 완전 빨간 스피어 + 꼬리 + 흰 입자 상승
  else if(T<=CK[5]){
    const p=t01(5);
    const R=Math.min(W,H);
    ctx.fillStyle='#020203'; ctx.fillRect(0,0,W,H);
    const introEnd=.28;

    if(p<introEnd){
      const bgFade=1-ease(clamp(p/.10));
      const weatherFade=1-ease(clamp((p-.10)/.10));
      const haloFade=1-ease(clamp((p-.20)/.08));

      drawAlley(1,{noTriangles:true,bgAlpha:bgFade,weatherAlpha:weatherFade});

      if(haloFade>0){
        const haloR=R*.22*2.35;
        const innerR=R*.22*.5;
        ctx.save();
        const halo=ctx.createRadialGradient(W*.5,H*.5,innerR,W*.5,H*.5,haloR);
        halo.addColorStop(0,`rgba(235,240,255,${.34*haloFade})`);
        halo.addColorStop(.25,`rgba(220,228,252,${.22*haloFade})`);
        halo.addColorStop(.55,`rgba(200,215,248,${.10*haloFade})`);
        halo.addColorStop(1,'rgba(190,210,245,0)');
        ctx.fillStyle=halo;
        ctx.beginPath();ctx.arc(W*.5,H*.5,haloR,0,7);ctx.fill();
        ctx.restore();
      }

      drawSphere({x:W*.5,y:H*.5,r:R*.22,
        color:'#0a0a0a',darkPct:1,speed:1.8,alpha:1});
      return;
    }

    const sp=clamp((p-introEnd)/(1-introEnd));

    if(sp<.55){
      const redPct=ease(sp/.55);
      drawSphere({x:W*.5,y:H*.5,r:R*.22,
        color:'#0a0a0a',darkPct:1,redPct,speed:1.8,alpha:1});
    } else {
      const q=ease((sp-.55)/.45);
      const sphereX=W*.5;
      const sphereY=mix(H*.5, H*.5+R*.22, q);
      drawSphere({x:sphereX,y:sphereY,r:R*.22,
        color:'#0a0a0a',darkPct:1,redPct:1,speed:1.8,alpha:1});
      drawFallingRedTrail(sphereX,sphereY,R*.22,q);
      ctx.save();
      for(let wi=0; wi<wind.length; wi++){
        if(wi % 10 >= 8) continue;
        const w=wind[wi];
        w.y-=w.v*mix(4.8,8.2,q);
        if(w.y<-30){w.y=H+30;w.x=rnd(W)}
        const br=Math.sin(now*.001+w.x*.003)*.5+.5;
        ctx.fillStyle=`rgba(${Math.round(mix(200,255,br))},${Math.round(mix(212,255,br))},${Math.round(mix(235,255,br))},${w.a*(.4+q*.6)})`;
        ctx.beginPath();ctx.arc(w.x,w.y,w.r*(1+q*.5),0,7);ctx.fill();
      }
      ctx.restore();
    }
  }

  // ── SEGMENT 6: New Beginning (T CK[5]..CK[6]) ───────────────────────────
  // Chapter 5 끝 화면에서 시작해 꼬리 fade out → 입자별 흰색 전환 → 중심 안착
  else if(T<=CK[6]){
    const p=t01(6);
    const R=Math.min(W,H);
    const tailFade=1-ease(clamp(p/.22));
    const whitenQ=clamp((p-.24)/.44);
    const moveQ=ease(clamp((p-.34)/.46));
    const settleQ=ease(clamp((p-.68)/.32));
    const starQ=ease(clamp((p-.48)/.52));

    ctx.fillStyle='#020203'; ctx.fillRect(0,0,W,H);
    if(starQ>0) drawStars(mix(.18,1,starQ));

    const sphereX=W*.5;
    const startY=H*.5+R*.22;
    const startR=R*.22;
    const passY=mix(startY,H*.28,moveQ);
    const passR=mix(startR,R*.14,moveQ);
    const sphereY=mix(passY,H*.5,settleQ);
    const sphereR=mix(passR,R*.19,settleQ);

    drawSphere({x:sphereX,y:sphereY,r:sphereR,
      color:'#0a0a0a',darkPct:1,redPct:1,whitePct:whitenQ,
      speed:mix(1.8,.55,ease(clamp((p-.18)/.82))),alpha:1});

    if(tailFade>0){
      ctx.save();
      ctx.globalAlpha=tailFade;
      drawFallingRedTrail(sphereX,startY,startR,1);
      ctx.restore();
    }

    ctx.save();
    for(let wi=0; wi<wind.length; wi++){
      if(wi % 10 >= 8) continue;
      const w=wind[wi];
      w.y-=w.v*mix(7.2,3.2,p);
      if(w.y<-30){w.y=H+30;w.x=rnd(W)}
      const br=Math.sin(now*.001+w.x*.003)*.5+.5;
      ctx.fillStyle=`rgba(${Math.round(mix(200,255,br))},${Math.round(mix(212,255,br))},${Math.round(mix(235,255,br))},${w.a*tailFade})`;
      ctx.beginPath();ctx.arc(w.x,w.y,w.r*(1+p*.35),0,7);ctx.fill();
    }
    ctx.restore();
  }

  // ── SEGMENT 7: Seed (T CK[6]..CK[7]) ────────────────────────────────────
  else if(T<=CK[7]){
    drawChapter7Seed(t01(7));
  }

  // ── SEGMENT 8: Sprout (T CK[7]..CK[8]) ──────────────────────────────────
  else {
    drawChapter8Sprout(t01(8));
  }

  // Gallery overlay (runs on top of any scene)
  if(S.gallery) S.galleryProg=Math.min(1,S.galleryProg+dt*.85);
  else S.galleryProg=Math.max(0,S.galleryProg-dt*1.8);
  if(S.galleryProg>0) drawGallery(S.galleryProg);
}

// ─── Labels ──────────────────────────────────────────────────────────────────
function setLabels(){
  const[t,d]=CHAPTER_INFO[S.chapter-1];
  $('#chapterSmall').textContent=`Chapter ${String(S.chapter).padStart(2,'0')}`;
  $('#chapterTitle').textContent=t;
  $('#chapterDesc').textContent=d;
  $('#presentationChapter').textContent=S.chapter;
  $('#presentationTotal').textContent=TOTAL;
}

// ─── Visitor particle ─────────────────────────────────────────────────────────
function addVisitorParticle(color){
  const idx=Math.floor(Math.random()*sphere.length);
  sphere[idx].special=true; sphere[idx].color=color||S.remoteColor;
  S.particles.push({color:color||S.remoteColor,at:Date.now()});
}

// ─── Firebase / room ─────────────────────────────────────────────────────────
const colors=['#f7c85f','#111111','#bf1830','#f8fbff','#4fd46f','#7dd3fc','#c084fc','#fb923c'];
function sanitize(v){return String(v||'').replace(/[^A-Z0-9]/gi,'').toUpperCase().slice(0,12)}
function roomRef(id){return ref(S.db,`rooms/${id}`)}
function newRoomId(){const a='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';return Array.from({length:6},()=>a[Math.floor(Math.random()*a.length)]).join('')}
function show(m){$('#notice').textContent=m}
function clear(){$('#notice').textContent=''}
function switchScreen(n){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(n+'Screen').classList.add('active');S.mode=n}
function remoteUrl(id){const u=new URL(location.href);u.search='';u.searchParams.set('mode','remote');u.searchParams.set('room',id);return u.toString()}
function renderQr(text){const box=$('#qrCode');box.innerHTML='';if(window.QRCode)new QRCode(box,{text,width:96,height:96,colorDark:'#000',colorLight:'#fff'});else{const img=document.createElement('img');img.src=`https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(text)}`;box.appendChild(img)}}

function applyChapter(v){
  const n=Math.max(1,Math.min(TOTAL,parseInt(v)||1));
  if(n===S.chapter) return setLabels();
  const wasChapter=S.chapter;
  S.prevChapter=wasChapter;
  S.chapter=n;
  // Target = end of chapter N's checkpoint (fully settled state)
  S.Tgt=CK[n];
  // Backward: snap T immediately so we don't animate in reverse
  if(n<wasChapter) S.T=CK[n];
  setLabels();
}
function applyBlack(v){S.black=!!v;$('#blackout').classList.toggle('active',S.black)}
function applyImmersive(v){
  const changed=S.immersive!==!!v;
  S.immersive=!!v;
  $('#presentationScreen').classList.toggle('immersive',S.immersive);
  const btn=$('#toggleFullscreen');if(btn)btn.classList.toggle('active',S.immersive);
  if(S.mode==='presentation'&&changed){
    if(v&&!document.fullscreenElement&&document.documentElement.requestFullscreen)
      document.documentElement.requestFullscreen().catch(()=>{});
    else if(!v&&document.fullscreenElement&&document.exitFullscreen)
      document.exitFullscreen().catch(()=>{});
  }
}
function applyGallery(v){S.gallery=!!v;const btn=$('#sphereGallery');if(btn)btn.classList.toggle('active',S.gallery)}
async function enterPresentationFullscreen(){
  applyImmersive(true);
  if(document.documentElement.requestFullscreen && !document.fullscreenElement){
    await document.documentElement.requestFullscreen().catch(()=>{});
  }
  if(S.ready&&S.roomId) write({immersive:true});
}
async function exitPresentationFullscreen(){
  if(document.fullscreenElement && document.exitFullscreen){
    await document.exitFullscreen().catch(()=>{});
  }
  applyImmersive(false);
  if(S.ready&&S.roomId) write({immersive:false});
}
function connected(v){$('#connectionDot').classList.toggle('on',v);$('#connectionText').textContent=v?'연결됨':'대기 중'}

function boot(){try{S.db=getDatabase(initializeApp(firebaseConfig));S.ready=true}catch(e){show('Firebase 초기화 실패: '+e.message)}}
function stopListen(){if(typeof S.unsub==='function')S.unsub();S.unsub=null;connected(false)}
function listen(id){
  if(!S.ready||!id)return;
  stopListen();
  S.unsub=onValue(roomRef(id),snap=>{
    const d=snap.val()||{};
    applyChapter(d.scene||1);
    applyBlack(d.blackScreen||false);
    applyImmersive(d.immersive||false);
    applyGallery(d.gallery||false);
    if(d.lastParticle?.at&&!S.particles.find(x=>x.at===d.lastParticle.at))
      addVisitorParticle(d.lastParticle.color);
    if(d.phoneOrient!=null) S.phoneOffset={x:d.phoneOrient.ox||0,y:d.phoneOrient.oy||0};
    connected(true);clear();
  },e=>{connected(false);show('Firebase 읽기 실패: '+e.message)});
}
async function write(patch){
  if(!S.ready||!S.roomId){show('Firebase 연결이 필요합니다.');return}
  const base={scene:S.chapter,blackScreen:S.black,immersive:S.immersive,gallery:S.gallery,updatedAt:Date.now()};
  // phoneOffset이 있으면 매 write마다 보존 (다른 이벤트로 덮어씌워지지 않도록)
  if(S.phoneOffset.x||S.phoneOffset.y) base.phoneOrient={ox:S.phoneOffset.x,oy:S.phoneOffset.y};
  await set(roomRef(S.roomId),{...base,...patch}).catch(e=>show('저장 실패: '+e.message));
}

async function startPresentation(){
  switchScreen('presentation');
  S.roomId=newRoomId();
  S.T=0; S.Tgt=0; S.chapter=1; S.lastRealTime=performance.now();
  applyBlack(false);applyImmersive(false);applyGallery(false);
  setLabels();
  $('#presentationRoom').textContent=S.roomId;
  const url=remoteUrl(S.roomId);
  $('#remoteLink').textContent=url;
  renderQr(url);
  history.replaceState({},'',`${location.pathname}?mode=presentation&room=${S.roomId}`);
  S.phoneOffset={x:0,y:0};
  if(S.ready){await write({scene:1,blackScreen:false,immersive:false,phoneOrient:null});listen(S.roomId)}
}
function startRemote(id=''){
  switchScreen('remote');
  const rid=sanitize(id);
  S.roomId=rid;
  $('#remoteRoom').textContent=rid||'------';
  $('#manualRoomCard').style.display=rid?'none':'block';
  if(rid){history.replaceState({},'',`${location.pathname}?mode=remote&room=${rid}`);listen(rid)}
  else show('발표 화면의 QR 코드로 접속하거나 Room ID를 입력하세요.');
}
function goHome(){stopListen();switchScreen('home');history.replaceState({},'',location.pathname);clear()}
function newColor(){S.remoteColor=colors[Math.floor(Math.random()*colors.length)];const orb=$('#remoteOrb');if(orb)orb.style.setProperty('--orb',S.remoteColor)}
async function sendGo(){const ev={color:S.remoteColor,at:Date.now()};addVisitorParticle(ev.color);newColor();if(S.ready&&S.roomId)await write({lastParticle:ev})}

// ─── 폰 방향 추적 (리모컨 전용) ───────────────────────────────────────────────
let _phoneRef=null, _lastOrient={beta:0,gamma:0}, _orientTimer=null;

// 디바이스 방향 이벤트 수신 (iOS permission 요청 전에도 리스너 등록)
window.addEventListener('deviceorientation',e=>{
  if(e.beta==null) return;
  _lastOrient={beta:e.beta, gamma:e.gamma};
  if(!_phoneRef) return;
  // 기준점 대비 델타 계산 → -1~1 정규화 (±30° = 풀 범위)
  const dg=_lastOrient.gamma - _phoneRef.gamma; // 좌우
  const db=_lastOrient.beta  - _phoneRef.beta;  // 상하
  S.phoneOffset={x:clamp(dg/30,-1,1), y:clamp(db/30,-1,1)};
});

async function calibratePhone(){
  // iOS 13+ 권한 요청
  if(typeof DeviceOrientationEvent!=='undefined' &&
     typeof DeviceOrientationEvent.requestPermission==='function'){
    try{
      const perm=await DeviceOrientationEvent.requestPermission();
      if(perm!=='granted'){show('방향 센서 권한이 필요합니다.');return;}
    }catch(e){show('권한 요청 실패: '+e.message);return;}
  }
  // 센서 데이터 확인
  if(_lastOrient.beta===0 && _lastOrient.gamma===0){
    // 아직 이벤트가 도착하지 않았을 경우 잠깐 대기 후 재시도
    show('센서 초기화 중... 잠시 후 다시 누르세요.');
    return;
  }
  // 현재 위치를 기준점으로 저장
  _phoneRef={beta:_lastOrient.beta, gamma:_lastOrient.gamma};
  S.phoneOffset={x:0,y:0};
  // 주기적으로 Firebase에 방향 전송 (150ms 간격)
  if(!_orientTimer){
    _orientTimer=setInterval(()=>{
      if(S.ready&&S.roomId&&_phoneRef){
        const ox=+(S.phoneOffset.x||0).toFixed(3);
        const oy=+(S.phoneOffset.y||0).toFixed(3);
        write({phoneOrient:{ox,oy}});
      }
    },150);
  }
  $('#calibrateBtn').classList.add('active');
  show('위치값 설정 완료! 핸드폰을 움직이면 스피어가 따라옵니다.');
}

// ─── Event listeners ─────────────────────────────────────────────────────────
$('#startPresentation').onclick=startPresentation;
$('#startRemote').onclick=()=>startRemote('');
$('#homeFromPresentation').onclick=goHome;
$('#homeFromRemote').onclick=goHome;
$('#fullScreenButton').onclick=enterPresentationFullscreen;
$('#previousChapter').onclick=()=>write({scene:Math.max(1,S.chapter-1)});
$('#nextChapter').onclick=()=>write({scene:Math.min(TOTAL,S.chapter+1)});
$('#toggleFullscreen').onclick=()=>{
  const next=!S.immersive;
  write({immersive:next});
  if(document.documentElement.requestFullscreen){
    if(next&&!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
    else if(!next&&document.fullscreenElement) document.exitFullscreen().catch(()=>{});
  }
};
$('#sphereGallery').onclick=()=>write({gallery:!S.gallery});
$('#calibrateBtn').onclick=calibratePhone;
$('#manualRoomConnect').onclick=()=>startRemote($('#manualRoomInput').value);
$('#manualRoomInput').onkeydown=e=>{if(e.key==='Enter')startRemote(e.currentTarget.value)};
document.addEventListener('keydown',e=>{
  if(e.key==='Escape' && S.immersive){exitPresentationFullscreen();return}
  if(S.mode!=='presentation')return;
  if(['ArrowRight','PageDown',' '].includes(e.key))write({scene:Math.min(TOTAL,S.chapter+1)});
  if(['ArrowLeft','PageUp'].includes(e.key))write({scene:Math.max(1,S.chapter-1)});
  if(e.key.toLowerCase()==='b')write({blackScreen:!S.black});
  if(e.key.toLowerCase()==='f')write({immersive:!S.immersive});
});
document.addEventListener('fullscreenchange',()=>{
  if(!document.fullscreenElement && S.immersive){
    applyImmersive(false);
    if(S.ready&&S.roomId) write({immersive:false});
  }
});

// ─── Boot ────────────────────────────────────────────────────────────────────
boot(); resize(); setLabels(); newColor(); render();
const params=new URLSearchParams(location.search);
const pmode=params.get('mode'), proom=sanitize(params.get('room'));
if(pmode==='remote')startRemote(proom);
else if(pmode==='presentation'&&proom){
  switchScreen('presentation');S.roomId=proom;
  $('#presentationRoom').textContent=proom;
  const url=remoteUrl(proom);$('#remoteLink').textContent=url;renderQr(url);listen(proom);
}
</script>
